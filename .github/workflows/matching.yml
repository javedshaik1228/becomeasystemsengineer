name: Matching engine build

on:
  push:
    paths:
      - "capstone/matching/**"
      - "scripts/check-matching.sh"
      - ".github/workflows/matching.yml"
  pull_request:
    paths:
      - "capstone/matching/**"
      - "scripts/check-matching.sh"
      - ".github/workflows/matching.yml"

jobs:
  learner-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure learner workspace
        run: cmake -S capstone/matching/work -B build/matching-work -DMATCHING_STEP=1 -DCMAKE_BUILD_TYPE=Debug
      - name: Build learner workspace
        run: cmake --build build/matching-work --parallel
      - name: Confirm first gate starts red
        run: '! ctest --test-dir build/matching-work --output-on-failure'

  reference-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure completed reference
        run: cmake -S capstone/matching/solution-reference -B build/matching-reference -DCMAKE_BUILD_TYPE=Debug -DMATCHING_WITH_RDKAFKA=OFF
      - name: Build
        run: cmake --build build/matching-reference --parallel
      - name: Test
        run: ctest --test-dir build/matching-reference --output-on-failure
      - name: Replay mock data
        run: |
          build/matching-reference/matching-generate build/orders.csv 10000 42
          build/matching-reference/matching-engine build/orders.csv > build/fills.csv
